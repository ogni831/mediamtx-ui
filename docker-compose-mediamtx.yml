networks:
  camnet:
    driver: bridge

services:

  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_VERSION}
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "${HLS_PORT}:${HLS_PORT}"                   # HLS
      - "${RTSP_PORT}:${RTSP_PORT}"                 # RTSP
      - "${RTMP_PORT}:${RTMP_PORT}"                 # RTMP
      - "${WEBRTC_PORT}:${WEBRTC_PORT}"             # WebRTC API
      - "${WEBRTC_UDP_PORT}:${WEBRTC_UDP_PORT}/udp" # WebRTC ICE/UDP
      - "${SRT_PORT}:${SRT_PORT}/udp"               # SRT
      - "${PLAYBACK_PORT}:${PLAYBACK_PORT}"         # Playback server (recorded video)
      # Metrics + API stay on loopback — only the UI (same docker network) and
      # a local Prometheus need them; never expose on 0.0.0.0.
      - "127.0.0.1:${METRICS_PORT}:${METRICS_PORT}" # Metrics
#      - "${API_PORT}:${API_PORT}"                   # API — reachable via docker network only
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro
      - ./media:/media
    networks:
      - camnet
    # Host video devices are only needed for local USB-camera capture (Pi use
    # case). For RTSP/ONVIF pull sources (the default), leave these commented.
    # devices:
    #   - '/dev/video10:/dev/video10'
    #   - '/dev/video11:/dev/video11'
