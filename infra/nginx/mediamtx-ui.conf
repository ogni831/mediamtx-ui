# =============================================================================
# Example reverse proxy for mediamtx-ui (Phase 3 hardening).
#
# The app binds to 127.0.0.1:3000 (see docker-compose.yml). Put this in front
# to add TLS + an extra Basic-auth layer and to expose it on the LAN safely.
# Adjust server_name / cert paths. Generate the htpasswd:
#   htpasswd -B -c /etc/nginx/.htpasswd-mediamtx <user>
# =============================================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name mediamtx-ui.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mediamtx-ui.local;

    ssl_certificate     /etc/nginx/certs/mediamtx-ui.crt;
    ssl_certificate_key /etc/nginx/certs/mediamtx-ui.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;

    # Optional second auth layer in front of the app's own login.
    # auth_basic "mediamtx-ui";
    # auth_basic_user_file /etc/nginx/.htpasswd-mediamtx;

    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (livereload / future use)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# NOTE: when serving over HTTPS like this, set SESSION_COOKIE_SECURE=true in .env
# so the session cookie carries the Secure attribute.
